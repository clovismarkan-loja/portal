<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Portal do Pesquisador IDOR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { margin: 0; padding: 0; background: #fff; }

    .login-page {
      display: flex;
      min-height: 100vh;
    }

    /* Left: image */
    .login-image {
      flex: 0 0 45%;
      background: url('bg-login.jpg') center/cover no-repeat;
      min-height: 100vh;
    }

    /* Right: form */
    .login-form {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 48px;
    }
    .login-form__inner {
      width: 100%;
      max-width: 400px;
    }

    /* Logo */
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo img {
      height: 56px;
      width: auto;
      margin: 0 auto 32px;
      display: block;
    }
    .login-logo h1 {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 8px;
    }
    .login-logo p {
      font-size: 14px;
      color: var(--gray-500);
      line-height: 1.5;
    }

    /* Form */
    .login-form .form-group { margin-bottom: 20px; }
    .login-form .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 6px;
    }
    .login-form .form-group .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .login-form .form-group .label-row a {
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-500);
    }
    .login-form .form-group .label-row a:hover { color: var(--blue-900); }
    .login-form .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--gray-300);
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color .2s ease;
      background: var(--white);
      color: var(--gray-900);
    }
    .login-form .form-input:focus {
      border-color: var(--blue-900);
      box-shadow: 0 0 0 3px rgba(1,73,142,.08);
    }
    .login-form .form-input::placeholder { color: var(--gray-400); }

    /* Button */
    .login-form .btn-login {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      background: var(--blue-900);
      color: var(--white);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s ease;
      margin-top: 8px;
    }
    .login-form .btn-login:hover { background: var(--blue-700); }

    /* Links */
    .login-links {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--gray-500);
    }
    .login-links a { font-weight: 600; color: var(--blue-900); }
    .login-links a:hover { color: var(--blue-600); }

    /* Footer */
    .login-footer {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: var(--gray-400);
    }
    .login-form { position: relative; }

    /* Responsive */
    @media (max-width: 768px) {
      .login-image { display: none; }
      .login-form { padding: 40px 24px; }
    }
  </style>
</head>
<body>

  <div class="login-page">

    <!-- Left: background image -->
    <div class="login-image"></div>

    <!-- Right: login form -->
    <div class="login-form">
      <div class="login-form__inner">

        <div class="login-logo">
          <img src="Logo IDOR.svg" alt="IDOR">
          <h1>Portal do Pesquisador</h1>
          <p>Acesse sua conta para explorar serviços, oportunidades e recursos do IDOR.</p>
        </div>

        <form onsubmit="event.preventDefault();">

          <div class="form-group">
            <label for="email">E-mail*</label>
            <input type="email" id="email" class="form-input" placeholder="seu.email@idor.org.br" required>
          </div>

          <div class="form-group">
            <div class="label-row">
              <label for="password">Senha*</label>
              <a href="#">Esqueceu a senha?</a>
            </div>
            <input type="password" id="password" class="form-input" placeholder="Digite sua senha" required>
          </div>

          <button type="submit" class="btn-login">Entrar</button>

        </form>

        <div class="login-links">
          <p>Ainda não tem conta? <a href="cadastro.html">Criar conta</a></p>
        </div>

      </div>

      <div class="login-footer">
        &copy; 2026 Instituto D'Or de Pesquisa e Ensino. Todos os direitos reservados.
      </div>
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
